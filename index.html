<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Личный Тест</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap"
			rel="stylesheet"
		/>
		<link rel="stylesheet" href="styles.css" />
	</head>
	<body>
		<div class="bg-shape bg-shape-1"></div>
		<div class="bg-shape bg-shape-2"></div>

		<main class="app">
			<section id="screen-menu" class="card screen active">
				<h1>Добро пожаловать в тест на Ксению</h1>
				<p class="subtitle">Проверьте, насколько вы Ксения. Всего 5 вопросов.</p>
				<p id="completion-note" class="completion-note"></p>
				<button id="start-btn" class="btn btn-primary">Начать тест</button>
			</section>

			<section id="screen-test" class="card screen">
				<div class="test-header">
					<p id="progress" class="progress">Вопрос 1 / 5</p>
					<div class="progress-bar">
						<div id="progress-fill" class="progress-fill"></div>
					</div>
				</div>

				<h2 id="question-text" class="question"></h2>
				<div id="answers" class="answers"></div>

				<div class="actions">
					<button id="next-btn" class="btn btn-primary" disabled>Далее</button>
				</div>
			</section>

			<section id="screen-result" class="card screen">
				<h2>Результат</h2>
				<p id="score-text" class="score"></p>
				<p id="result-message" class="result-message"></p>
				<div id="result-details" class="result-details"></div>
				<button id="restart-btn" class="btn btn-secondary">На главную</button>
			</section>
		</main>

		<script src="script.js"></script>
	</body>
</html>
